<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables - FRD-02</title>
</head>
<body>
    <h1>Sample Data Table</h1>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Alice Smith</td>
                <td>24</td>
                <td>Female</td>
                <td>alice@example.com</td>
                <td>0412 345 678</td>
                <td>10 Main St, Sydney</td>
            </tr>
            <tr>
                <td>Bob Jones</td>
                <td>31</td>
                <td>Male</td>
                <td>bob@example.com</td>
                <td>0498 765 432</td>
                <td>5 Park Ave, Melbourne</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
