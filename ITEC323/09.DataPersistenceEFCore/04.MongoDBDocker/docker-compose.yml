services:
  mongodb:
    image: mongo:7
    container_name: itec323_mongodb_docker
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb_docker_user
      MONGO_INITDB_ROOT_PASSWORD: mongodb_docker_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
