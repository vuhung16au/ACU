<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRD-12 - Flexbox Layout</title>
    <link rel="stylesheet" href="../css/FRD-12-flexbox-layout.css">
</head>
<body>
    <h1>Flexbox Layout</h1>
    <p>Flexbox arranges items in a row or column and can align or distribute space between them.</p>

    <h2>Row (default)</h2>
    <div class="flex-row">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

    <h2>Column</h2>
    <div class="flex-col">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
    </div>

    <h2>Center and space-between</h2>
    <div class="flex-center">
        <div class="box">Center</div>
    </div>
    <div class="flex-between">
        <div class="box">Left</div>
        <div class="box">Right</div>
    </div>

    <h2>Wrap</h2>
    <div class="flex-wrap">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
</body>
</html>
