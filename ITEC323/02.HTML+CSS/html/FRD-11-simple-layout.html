<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRD-11 - Simple Layout</title>
    <link rel="stylesheet" href="../css/FRD-11-simple-layout.css">
</head>
<body>
    <header class="header">
        <h1>Site Title</h1>
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main">
        <aside class="sidebar">
            <h2>Sidebar</h2>
            <p>Links or extra content go here.</p>
        </aside>
        <article class="content">
            <h2>Main Content</h2>
            <p>This is the main area. A simple layout uses header, main (with sidebar + content), and footer.</p>
        </article>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Example. FRD-11 Simple Layout.</p>
    </footer>
</body>
</html>
