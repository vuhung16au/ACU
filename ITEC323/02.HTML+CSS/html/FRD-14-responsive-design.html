<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRD-14 - Responsive Design</title>
    <link rel="stylesheet" href="../css/FRD-14-responsive-design.css">
</head>
<body>
    <header class="header">
        <h1>Responsive Design</h1>
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main">
        <section class="card">
            <h2>Card 1</h2>
            <p>Resize the browser. Layout and font size change at breakpoints.</p>
        </section>
        <section class="card">
            <h2>Card 2</h2>
            <p>On small screens cards stack; on wider screens they sit in a row.</p>
        </section>
        <section class="card">
            <h2>Card 3</h2>
            <p>Media queries in CSS switch styles by viewport width.</p>
        </section>
    </main>

    <footer class="footer">
        <p>FRD-14 – Try narrow (&lt; 600px) and wide viewports.</p>
    </footer>
</body>
</html>
