<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRD-13 - Grid Layout</title>
    <link rel="stylesheet" href="../css/FRD-13-grid-layout.css">
</head>
<body>
    <h1>Grid Layout</h1>
    <p>CSS Grid defines rows and columns; you place items into cells.</p>

    <h2>Simple 3×2 grid</h2>
    <div class="grid-simple">
        <div class="cell">1</div>
        <div class="cell">2</div>
        <div class="cell">3</div>
        <div class="cell">4</div>
        <div class="cell">5</div>
        <div class="cell">6</div>
    </div>

    <h2>Grid with areas</h2>
    <div class="grid-areas">
        <header class="cell header">Header</header>
        <aside class="cell sidebar">Sidebar</aside>
        <main class="cell main">Main</main>
        <footer class="cell footer">Footer</footer>
    </div>
</body>
</html>
